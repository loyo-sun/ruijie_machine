<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" role="img" aria-labelledby="title desc">
  <title id="title">Smart precast beam factory production flow diagram</title>
  <desc id="desc">A simplified visual diagram showing mobile mold trolley lines, concrete placing, vibration, curing, demolding and a smart control platform.</desc>
  <defs>
    <linearGradient id="yard" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8faf7"/>
      <stop offset="1" stop-color="#e4eee9"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#17313d" flood-opacity=".14"/>
    </filter>
  </defs>
  <rect width="920" height="560" rx="18" fill="url(#yard)"/>
  <path d="M60 440h800" stroke="#cad8d1" stroke-width="3" stroke-linecap="round"/>
  <path d="M92 124h632" stroke="#cad8d1" stroke-width="8" stroke-linecap="round" stroke-dasharray="1 24"/>
  <path d="M92 230h632" stroke="#cad8d1" stroke-width="8" stroke-linecap="round" stroke-dasharray="1 24"/>
  <path d="M92 336h632" stroke="#cad8d1" stroke-width="8" stroke-linecap="round" stroke-dasharray="1 24"/>

  <g filter="url(#soft)">
    <rect x="70" y="86" width="500" height="76" rx="8" fill="#ffffff" stroke="#b8cac1"/>
    <rect x="70" y="192" width="500" height="76" rx="8" fill="#ffffff" stroke="#b8cac1"/>
    <rect x="70" y="298" width="500" height="76" rx="8" fill="#ffffff" stroke="#b8cac1"/>
  </g>

  <g fill="#17313d">
    <rect x="102" y="111" width="360" height="24" rx="12"/>
    <rect x="102" y="217" width="360" height="24" rx="12"/>
    <rect x="102" y="323" width="360" height="24" rx="12"/>
  </g>
  <g fill="#36a39a">
    <circle cx="496" cy="123" r="16"/>
    <circle cx="496" cy="229" r="16"/>
    <circle cx="496" cy="335" r="16"/>
  </g>
  <g fill="#f59f32">
    <rect x="604" y="88" width="112" height="72" rx="8"/>
    <rect x="604" y="194" width="112" height="72" rx="8"/>
    <rect x="604" y="300" width="112" height="72" rx="8"/>
  </g>
  <g fill="#ffffff" font-family="Arial, sans-serif" font-size="16" font-weight="700">
    <text x="626" y="130">Curing</text>
    <text x="626" y="236">Curing</text>
    <text x="626" y="342">Curing</text>
  </g>

  <g filter="url(#soft)">
    <rect x="750" y="92" width="112" height="280" rx="10" fill="#17313d"/>
    <rect x="770" y="116" width="72" height="52" rx="6" fill="#36a39a"/>
    <rect x="770" y="188" width="72" height="12" rx="6" fill="#d9e7e1"/>
    <rect x="770" y="216" width="72" height="12" rx="6" fill="#d9e7e1"/>
    <rect x="770" y="244" width="72" height="12" rx="6" fill="#d9e7e1"/>
    <rect x="770" y="294" width="72" height="42" rx="6" fill="#f59f32"/>
  </g>

  <g font-family="Arial, sans-serif" fill="#17313d">
    <text x="78" y="58" font-size="24" font-weight="700">Smart Girder Yard Production Flow</text>
    <text x="96" y="106" font-size="14" font-weight="700">Mobile mold trolley line</text>
    <text x="96" y="212" font-size="14" font-weight="700">Concrete placing + vibration</text>
    <text x="96" y="318" font-size="14" font-weight="700">Demolding and turnover</text>
    <text x="746" y="404" font-size="15" font-weight="700">Smart control platform</text>
  </g>
  <g stroke="#36a39a" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M506 123h88"/>
    <path d="M506 229h88"/>
    <path d="M506 335h88"/>
    <path d="M716 124h24"/>
    <path d="M716 230h24"/>
    <path d="M716 336h24"/>
  </g>
</svg>
