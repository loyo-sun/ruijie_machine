<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>瑞捷新闻与资源编辑器</title>
    <style>
      :root {
        --ink: #17313d;
        --ink-soft: #52676f;
        --green: #177267;
        --orange: #f59f32;
        --paper: #f7f8f5;
        --white: #ffffff;
        --line: #d8e1dc;
        --danger: #a33f32;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--ink);
        background: var(--paper);
      }

      header {
        padding: 26px 32px;
        border-bottom: 1px solid var(--line);
        background: var(--white);
      }

      header h1 {
        margin: 0 0 8px;
        font-size: 28px;
        letter-spacing: 0;
      }

      header p {
        max-width: 820px;
        margin: 0;
        color: var(--ink-soft);
        line-height: 1.6;
      }

      main {
        display: grid;
        grid-template-columns: minmax(360px, 0.92fr) minmax(360px, 1.08fr);
        gap: 24px;
        width: min(1380px, calc(100% - 40px));
        margin: 24px auto 42px;
      }

      section {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--white);
      }

      .panel {
        padding: 22px;
      }

      .panel h2 {
        margin: 0 0 18px;
        font-size: 18px;
      }

      form {
        display: grid;
        gap: 16px;
      }

      label,
      fieldset {
        display: grid;
        gap: 8px;
        margin: 0;
        padding: 0;
        border: 0;
        font-size: 14px;
        font-weight: 750;
      }

      input,
      select,
      textarea {
        width: 100%;
        min-height: 42px;
        padding: 10px 11px;
        border: 1px solid #c8d4ce;
        border-radius: 6px;
        color: var(--ink);
        background: var(--white);
        font: inherit;
      }

      textarea {
        min-height: 280px;
        resize: vertical;
        line-height: 1.55;
      }

      input:focus,
      select:focus,
      textarea:focus {
        outline: 3px solid rgba(23, 114, 103, 0.16);
        border-color: var(--green);
      }

      .row {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .option-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .option-row label {
        display: inline-flex;
        grid-template-columns: auto 1fr;
        align-items: center;
        gap: 7px;
        padding: 9px 11px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: #f8faf8;
        cursor: pointer;
      }

      .option-row input {
        width: auto;
        min-height: auto;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }

      button {
        min-height: 42px;
        padding: 0 16px;
        border: 1px solid transparent;
        border-radius: 8px;
        color: var(--white);
        background: var(--green);
        font: inherit;
        font-weight: 800;
        cursor: pointer;
      }

      button.secondary {
        color: var(--ink);
        background: var(--white);
        border-color: var(--line);
      }

      .hint {
        color: var(--ink-soft);
        font-size: 13px;
        font-weight: 500;
        line-height: 1.55;
      }

      .preview {
        display: grid;
        grid-template-rows: auto 1fr;
        min-height: 680px;
      }

      .preview-head {
        display: flex;
        justify-content: space-between;
        gap: 14px;
        padding: 18px 20px;
        border-bottom: 1px solid var(--line);
      }

      .preview-head h2 {
        margin: 0;
        font-size: 18px;
      }

      .url-preview {
        color: var(--green);
        font-size: 13px;
        font-weight: 800;
        word-break: break-all;
      }

      pre {
        min-height: 0;
        margin: 0;
        padding: 20px;
        overflow: auto;
        color: #e9f3ef;
        background: #17313d;
        font-size: 13px;
        line-height: 1.58;
      }

      .status {
        min-height: 24px;
        color: var(--green);
        font-size: 14px;
        font-weight: 760;
      }

      .status.error {
        color: var(--danger);
      }

      .existing {
        display: grid;
        gap: 8px;
        margin-top: 18px;
        padding-top: 18px;
        border-top: 1px solid var(--line);
      }

      .existing ul {
        display: grid;
        gap: 6px;
        margin: 0;
        padding-left: 18px;
        color: var(--ink-soft);
        font-size: 13px;
      }

      @media (max-width: 980px) {
        main,
        .row {
          grid-template-columns: 1fr;
        }

        main {
          width: min(100% - 24px, 1380px);
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>瑞捷新闻与资源编辑器</h1>
      <p>
        不需要手写 frontmatter。你可以在这里填写标题、分类、发布日期、摘要和正文，草稿默认保存到 <strong>docs/resource-drafts/</strong>，
        内容确认后也可以直接发布到 <strong>src/content/resources/</strong>，由网站自动生成新闻/资源页面。
      </p>
    </header>

    <main>
      <section class="panel">
        <h2>文章信息</h2>
        <form id="resource-form">
          <label>
            标题
            <input id="title" name="title" required placeholder="例如：传统固定台座梁场 vs 智慧梁场" />
          </label>

          <div class="row">
            <label>
              URL 地址
              <input id="slug" name="slug" required placeholder="fixed-bed-vs-smart-girder-yard" />
              <span class="hint">建议使用英文小写和连字符。最终地址会是 /resources/your-slug/。</span>
            </label>
            <label>
              发布日期
              <input id="date" name="date" type="date" required />
            </label>
          </div>

          <div class="row">
            <label>
              分类
              <select id="category" name="category" required></select>
            </label>
            <label>
              标签
              <input id="tags" name="tags" placeholder="smart girder yard, bridge girder production" />
              <span class="hint">多个标签用英文逗号分隔。标签建议仍使用英文，便于海外SEO。</span>
            </label>
          </div>

          <label>
            SEO 摘要
            <input id="description" name="description" placeholder="用一句话概括文章内容，用于搜索结果和资源列表页。" />
          </label>

          <fieldset>
            保存位置
            <div class="option-row">
              <label><input type="radio" name="target" value="draft" checked /> 保存草稿到 docs</label>
              <label><input type="radio" name="target" value="publish" /> 发布到网站</label>
              <label><input type="radio" name="target" value="both" /> 草稿和发布都保存</label>
            </div>
          </fieldset>

          <fieldset>
            选项
            <div class="option-row">
              <label><input id="featured" type="checkbox" /> 设为重点文章</label>
              <label><input id="overwrite" type="checkbox" /> 允许覆盖同名文件</label>
            </div>
          </fieldset>

          <label>
            正文
            <textarea id="body" name="body" required placeholder="在这里填写正文。可以使用 Markdown 标题、列表和段落。"></textarea>
          </label>

          <div class="actions">
            <button type="submit">保存 Markdown</button>
            <button class="secondary" type="button" id="refresh">刷新文件列表</button>
          </div>
          <div id="status" class="status" aria-live="polite"></div>
        </form>

        <div class="existing">
          <strong>已有 Markdown 文件</strong>
          <ul id="existing-files"></ul>
        </div>
      </section>

      <section class="preview">
        <div class="preview-head">
          <h2>Markdown 预览</h2>
          <div id="url-preview" class="url-preview">/resources/</div>
        </div>
        <pre id="markdown-preview"></pre>
      </section>
    </main>

    <script type="module">
      const form = document.querySelector("#resource-form");
      const fields = {
        title: document.querySelector("#title"),
        slug: document.querySelector("#slug"),
        date: document.querySelector("#date"),
        category: document.querySelector("#category"),
        tags: document.querySelector("#tags"),
        description: document.querySelector("#description"),
        featured: document.querySelector("#featured"),
        overwrite: document.querySelector("#overwrite"),
        body: document.querySelector("#body")
      };
      const statusEl = document.querySelector("#status");
      const previewEl = document.querySelector("#markdown-preview");
      const urlPreviewEl = document.querySelector("#url-preview");
      const existingFilesEl = document.querySelector("#existing-files");

      function slugify(value) {
        return String(value || "")
          .trim()
          .toLowerCase()
          .replace(/['"]/g, "")
          .replace(/&/g, " and ")
          .replace(/[^a-z0-9]+/g, "-")
          .replace(/^-+|-+$/g, "")
          .slice(0, 90);
      }

      function escapeYaml(value) {
        return String(value || "").replace(/\\/g, "\\\\").replace(/"/g, '\\"');
      }

      function getTags() {
        return fields.tags.value
          .split(",")
          .map((tag) => tag.trim())
          .filter(Boolean);
      }

      function getTarget() {
        return new FormData(form).get("target") || "draft";
      }

      function buildMarkdown() {
        const tags = getTags();
        const tagLines = tags.length > 0 ? tags.map((tag) => `  - ${tag}`) : ["  - smart girder yard"];
        return [
          "---",
          `title: "${escapeYaml(fields.title.value)}"`,
          `description: "${escapeYaml(fields.description.value)}"`,
          `date: "${fields.date.value}"`,
          `category: "${escapeYaml(fields.category.value)}"`,
          "tags:",
          ...tagLines,
          `featured: ${fields.featured.checked ? "true" : "false"}`,
          "---",
          "",
          fields.body.value || "Write the article body here."
        ].join("\n");
      }

      function updatePreview() {
        const slug = slugify(fields.slug.value || fields.title.value);
        if (!fields.slug.matches(":focus")) {
          fields.slug.value = slug;
        }
        urlPreviewEl.textContent = slug ? `/resources/${slug}/` : "/resources/";
        previewEl.textContent = buildMarkdown();
      }

      async function loadMeta() {
        const response = await fetch("/api/meta");
        const data = await response.json();
        fields.category.innerHTML = data.categories
          .map((category) => `<option value="${category.value}">${category.label}（${category.value}）</option>`)
          .join("");
      }

      async function loadExistingFiles() {
        const response = await fetch("/api/articles");
        const data = await response.json();
        const rows = [
          ...data.drafts.map((item) => `草稿：docs/resource-drafts/${item.file}`),
          ...data.published.map((item) => `已发布：src/content/resources/${item.file}`)
        ];
        existingFilesEl.innerHTML = rows.length > 0
          ? rows.map((row) => `<li>${row}</li>`).join("")
          : "<li>还没有 Markdown 文件。</li>";
      }

      function setStatus(message, isError = false) {
        statusEl.textContent = message;
        statusEl.classList.toggle("error", isError);
      }

      form.addEventListener("input", updatePreview);
      document.querySelector("#refresh").addEventListener("click", loadExistingFiles);

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        setStatus("正在保存...");
        const payload = {
          title: fields.title.value,
          slug: fields.slug.value,
          date: fields.date.value,
          category: fields.category.value,
          tags: getTags(),
          description: fields.description.value,
          featured: fields.featured.checked,
          overwrite: fields.overwrite.checked,
          target: getTarget(),
          body: fields.body.value
        };

        const response = await fetch("/api/save", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify(payload)
        });
        const data = await response.json();

        if (!response.ok) {
          setStatus(data.error || "保存失败。", true);
          return;
        }

        setStatus(`已保存：${data.files.join(", ")}`);
        await loadExistingFiles();
      });

      fields.date.value = new Date().toISOString().slice(0, 10);
      fields.body.value = "## 背景\n\n在这里填写文章正文。\n\n## 关键内容\n\n- 要点一\n- 要点二\n\n## 下一步\n\n引导读者联系瑞捷，进行项目沟通。";

      await loadMeta();
      await loadExistingFiles();
      updatePreview();
    </script>
  </body>
</html>
