<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>瑞捷 Markdown 编辑器</title>
    <style>
      :root {
        --ink: #17313d;
        --ink-soft: #52676f;
        --green: #177267;
        --orange: #f59f32;
        --paper: #f7f8f5;
        --white: #ffffff;
        --line: #d8e1dc;
        --danger: #a33f32;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--ink);
        background: var(--paper);
      }

      header {
        padding: 26px 32px;
        border-bottom: 1px solid var(--line);
        background: var(--white);
      }

      header h1 {
        margin: 0 0 8px;
        font-size: 28px;
        letter-spacing: 0;
      }

      header p {
        max-width: 820px;
        margin: 0;
        color: var(--ink-soft);
        line-height: 1.6;
      }

      main {
        display: grid;
        grid-template-columns: 1fr;
        gap: 24px;
        width: min(1200px, calc(100% - 40px));
        margin: 24px auto 42px;
      }

      section {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--white);
      }

      .panel {
        padding: 22px;
      }

      .panel h2 {
        margin: 0 0 18px;
        font-size: 18px;
      }

      form {
        display: grid;
        gap: 24px;
      }

      label,
      fieldset {
        display: grid;
        gap: 8px;
        margin: 0;
        padding: 0;
        border: 0;
        font-size: 14px;
        font-weight: 750;
      }

      /* Config section styling */
      .config-section {
        padding: 18px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #f8faf8;
        margin-top: 4px;
      }

      .config-section summary {
        padding: 4px;
        font-size: 15px;
        cursor: pointer;
        user-select: none;
        list-style: none;
      }

      .config-section summary::-webkit-details-marker {
        display: none;
      }

      .config-section summary::before {
        content: "▶ ";
        display: inline-block;
        transition: transform 0.2s;
      }

      .config-section[open] summary::before {
        transform: rotate(90deg);
      }

      .config-section summary:hover {
        color: var(--green);
      }

      .config-content {
        display: grid;
        gap: 16px;
        margin-top: 16px;
        padding-top: 16px;
        border-top: 1px solid var(--line);
      }

      input,
      select,
      textarea {
        width: 100%;
        min-height: 42px;
        padding: 10px 11px;
        border: 1px solid #c8d4ce;
        border-radius: 6px;
        color: var(--ink);
        background: var(--white);
        font: inherit;
      }

      textarea {
        min-height: 280px;
        resize: vertical;
        line-height: 1.55;
      }

      input:focus,
      select:focus,
      textarea:focus {
        outline: 3px solid rgba(23, 114, 103, 0.16);
        border-color: var(--green);
      }

      .row {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .option-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .option-row label {
        display: inline-flex;
        grid-template-columns: auto 1fr;
        align-items: center;
        gap: 7px;
        padding: 9px 11px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: #f8faf8;
        cursor: pointer;
      }

      .option-row input {
        width: auto;
        min-height: auto;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }

      button {
        min-height: 42px;
        padding: 0 16px;
        border: 1px solid transparent;
        border-radius: 8px;
        color: var(--white);
        background: var(--green);
        font: inherit;
        font-weight: 800;
        cursor: pointer;
      }

      button:hover {
        background: #146057;
      }

      button.secondary {
        color: var(--ink);
        background: var(--white);
        border-color: var(--line);
      }

      button.secondary:hover {
        background: var(--paper);
        border-color: var(--green);
      }

      .hint {
        color: var(--ink-soft);
        font-size: 13px;
        font-weight: 500;
        line-height: 1.55;
      }

      .editor-shell {
        display: grid;
        gap: 10px;
      }

      .editor-toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #f8faf8;
      }

      .editor-toolbar button {
        min-height: 34px;
        padding: 0 11px;
        border: 1px solid var(--line);
        border-radius: 6px;
        color: var(--ink);
        background: var(--white);
        font-size: 13px;
        font-weight: 800;
        cursor: pointer;
      }

      .editor-toolbar button:hover {
        background: var(--paper);
        border-color: var(--green);
      }

      .visual-editor {
        min-height: 420px;
        padding: 22px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--white);
        line-height: 1.75;
      }

      .visual-editor:focus {
        outline: 3px solid rgba(23, 114, 103, 0.16);
        border-color: var(--green);
      }

      .visual-editor h2,
      .article-preview h2 {
        margin: 28px 0 12px;
        font-size: 24px;
      }

      .visual-editor h3,
      .article-preview h3 {
        margin: 22px 0 10px;
        font-size: 18px;
      }

      .visual-editor p,
      .article-preview p {
        margin: 0 0 14px;
        color: var(--ink-soft);
      }

      .visual-editor ul,
      .article-preview ul {
        margin: 0 0 16px;
        padding-left: 22px;
        color: var(--ink-soft);
      }

      .visual-editor img,
      .article-preview img {
        display: block;
        max-width: 100%;
        margin: 18px 0 8px;
        border: 1px solid var(--line);
        border-radius: 8px;
      }

      .preview {
        display: none;
        grid-template-rows: auto auto 1fr;
        min-height: 500px;
      }

      .preview.visible {
        display: grid;
      }

      .preview-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 14px;
        padding: 18px 20px;
        border-bottom: 1px solid var(--line);
      }

      .preview-head h2 {
        margin: 0;
        font-size: 18px;
      }

      #close-preview {
        min-height: 32px;
        padding: 0 12px;
        font-size: 13px;
      }

      .preview-meta {
        padding: 14px 20px;
        border-bottom: 1px solid var(--line);
        background: #f8faf8;
        font-size: 13px;
      }

      .url-preview {
        color: var(--green);
        font-weight: 800;
        word-break: break-all;
      }

      .article-preview {
        padding: 22px;
        overflow: auto;
      }

      .status {
        min-height: 24px;
        color: var(--green);
        font-size: 14px;
        font-weight: 760;
      }

      .status.error {
        color: var(--danger);
      }

      .existing {
        display: grid;
        gap: 8px;
        margin-top: 18px;
        padding-top: 18px;
        border-top: 1px solid var(--line);
      }

      .existing ul {
        display: grid;
        gap: 6px;
        margin: 0;
        padding-left: 18px;
        color: var(--ink-soft);
        font-size: 13px;
      }

      @media (max-width: 980px) {
        .row {
          grid-template-columns: 1fr;
        }

        main {
          width: calc(100% - 24px);
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>瑞捷 Markdown 编辑器</h1>
      <p>
        编辑和发布 News & Resources 文章。填写标题和正文后，点击发布按钮会自动保存 Markdown 文件到 <strong>src/content/resources/</strong>，图片保存到 <strong>public/resource-images/</strong>。
      </p>
    </header>

    <main>
      <section class="panel">
        <h2>文章编辑</h2>
        <form id="resource-form">
          <!-- 1. 标题和内容放在最前面 -->
          <label>
            <strong style="font-size: 15px;">标题</strong>
            <input id="title" name="title" required placeholder="例如：Traditional Fixed-Bed vs Smart Girder Yard" />
          </label>

          <div class="editor-shell">
            <strong style="font-size: 15px;">正文内容</strong>
            <div class="editor-toolbar" aria-label="正文编辑工具栏">
              <button type="button" data-command="formatBlock" data-value="h2">H2 标题</button>
              <button type="button" data-command="formatBlock" data-value="h3">H3 标题</button>
              <button type="button" data-command="formatBlock" data-value="p">段落</button>
              <button type="button" data-command="insertUnorderedList">列表</button>
              <button type="button" data-command="bold">加粗</button>
              <button type="button" id="insert-image-btn">插入图片</button>
            </div>
            <div id="body-editor" class="visual-editor" contenteditable="true" role="textbox" aria-label="正文可视化编辑区"></div>
            <span class="hint">在这里直接排版正文。点击"插入图片"选择本地图片文件，图片会自动保存到 public/resource-images/ 并使用相对路径引用。</span>
          </div>

          <!-- 2. 其他配置内容在下面 -->
          <details class="config-section" open>
            <summary><strong>文章配置</strong></summary>
            <div class="config-content">
              <div class="row">
                <label>
                  URL 地址
                  <input id="slug" name="slug" required placeholder="fixed-bed-vs-smart-girder-yard" />
                  <span class="hint">英文小写加连字符，最终地址：/resources/your-slug/</span>
                </label>
                <label>
                  发布日期
                  <input id="date" name="date" type="date" required />
                </label>
              </div>

              <div class="row">
                <label>
                  分类
                  <select id="category" name="category" required>
                    <option value="">请选择分类</option>
                  </select>
                </label>
                <label>
                  标签
                  <input id="tags" name="tags" placeholder="smart girder yard, precast beam" />
                  <span class="hint">多个标签用英文逗号分隔</span>
                </label>
              </div>

              <label>
                SEO 摘要
                <input id="description" name="description" placeholder="用一句话概括文章内容，用于搜索结果和列表页" />
              </label>

              <fieldset>
                选项
                <div class="option-row">
                  <label><input id="featured" type="checkbox" /> 设为重点文章</label>
                  <label><input id="overwrite" type="checkbox" /> 允许覆盖同名文件</label>
                </div>
              </fieldset>
            </div>
          </details>

          <div class="actions">
            <button type="submit">发布到网站</button>
            <button class="secondary" type="button" id="preview-btn">预览效果</button>
            <button class="secondary" type="button" id="refresh">刷新文件列表</button>
          </div>
          <div id="status" class="status" aria-live="polite"></div>
        </form>

        <div class="existing">
          <strong>已发布的文章</strong>
          <ul id="existing-files"></ul>
        </div>
      </section>

      <section class="preview" id="preview-section">
        <div class="preview-head">
          <h2>文章预览</h2>
          <button class="secondary" id="close-preview">关闭预览</button>
        </div>
        <div class="preview-meta">
          <div><strong>URL:</strong> <span id="url-preview" class="url-preview">/resources/</span></div>
        </div>
        <article id="article-preview" class="article-preview"></article>
      </section>
    </main>

    <!-- Hidden file input for images -->
    <input id="image-upload" type="file" accept="image/*" style="display: none;" />

    <script type="module">
      const form = document.querySelector("#resource-form");
      const fields = {
        title: document.querySelector("#title"),
        slug: document.querySelector("#slug"),
        date: document.querySelector("#date"),
        category: document.querySelector("#category"),
        tags: document.querySelector("#tags"),
        description: document.querySelector("#description"),
        featured: document.querySelector("#featured"),
        overwrite: document.querySelector("#overwrite"),
        bodyEditor: document.querySelector("#body-editor"),
        imageUpload: document.querySelector("#image-upload")
      };
      const statusEl = document.querySelector("#status");
      const articlePreviewEl = document.querySelector("#article-preview");
      const urlPreviewEl = document.querySelector("#url-preview");
      const existingFilesEl = document.querySelector("#existing-files");
      const previewSection = document.querySelector("#preview-section");
      const previewBtn = document.querySelector("#preview-btn");
      const closePreviewBtn = document.querySelector("#close-preview");
      const insertImageBtn = document.querySelector("#insert-image-btn");

      function slugify(value) {
        return String(value || "")
          .trim()
          .toLowerCase()
          .replace(/['"]/g, "")
          .replace(/&/g, " and ")
          .replace(/[^a-z0-9]+/g, "-")
          .replace(/^-+|-+$/g, "")
          .slice(0, 90);
      }

      function escapeYaml(value) {
        return String(value || "").replace(/\\/g, "\\\\").replace(/"/g, '\\"');
      }

      function getTags() {
        return fields.tags.value
          .split(",")
          .map((tag) => tag.trim())
          .filter(Boolean);
      }

      function escapeMarkdown(value) {
        return String(value || "").replace(/\[/g, "\\[").replace(/\]/g, "\\]");
      }

      function inlineMarkdown(node) {
        if (node.nodeType === Node.TEXT_NODE) {
          return node.textContent || "";
        }

        if (node.nodeType !== Node.ELEMENT_NODE) {
          return "";
        }

        const element = node;
        const text = Array.from(element.childNodes).map(inlineMarkdown).join("");

        if (element.tagName === "STRONG" || element.tagName === "B") {
          return `**${text}**`;
        }

        if (element.tagName === "EM" || element.tagName === "I") {
          return `*${text}*`;
        }

        if (element.tagName === "BR") {
          return "\n";
        }

        return text;
      }

      function editorHtmlToMarkdown() {
        const blocks = [];

        for (const node of fields.bodyEditor.childNodes) {
          if (node.nodeType === Node.TEXT_NODE) {
            const text = node.textContent.trim();
            if (text) blocks.push(text);
            continue;
          }

          if (node.nodeType !== Node.ELEMENT_NODE) {
            continue;
          }

          const element = node;
          const tag = element.tagName;

          if (tag === "H2") {
            blocks.push(`## ${inlineMarkdown(element).trim()}`);
          } else if (tag === "H3") {
            blocks.push(`### ${inlineMarkdown(element).trim()}`);
          } else if (tag === "UL") {
            const items = Array.from(element.querySelectorAll(":scope > li"))
              .map((item) => `- ${inlineMarkdown(item).trim()}`)
              .filter((item) => item !== "-");
            if (items.length) blocks.push(items.join("\n"));
          } else if (tag === "IMG") {
            const src = element.getAttribute("src") || "";
            const alt = element.getAttribute("alt") || "Resource image";
            if (src) blocks.push(`![${escapeMarkdown(alt)}](${src})`);
          } else if (tag === "FIGURE") {
            const img = element.querySelector("img");
            if (img) {
              const src = img.getAttribute("src") || "";
              const alt = img.getAttribute("alt") || "Resource image";
              if (src) blocks.push(`![${escapeMarkdown(alt)}](${src})`);
            }
          } else {
            const text = inlineMarkdown(element).trim();
            if (text) blocks.push(text);
            for (const img of element.querySelectorAll("img")) {
              const src = img.getAttribute("src") || "";
              const alt = img.getAttribute("alt") || "Resource image";
              if (src) blocks.push(`![${escapeMarkdown(alt)}](${src})`);
            }
          }
        }

        return blocks.join("\n\n").trim();
      }

      function updatePreview() {
        const slug = slugify(fields.slug.value || fields.title.value);
        if (!fields.slug.matches(":focus")) {
          fields.slug.value = slug;
        }
        urlPreviewEl.textContent = slug ? `/resources/${slug}/` : "/resources/";
        articlePreviewEl.innerHTML = fields.bodyEditor.innerHTML;
      }

      async function loadMeta() {
        const response = await fetch("/api/meta");
        const data = await response.json();
        fields.category.innerHTML = '<option value="">请选择分类</option>' + 
          data.categories
            .map((category) => `<option value="${category.value}">${category.label}（${category.value}）</option>`)
            .join("");
      }

      async function loadExistingFiles() {
        const response = await fetch("/api/articles");
        const data = await response.json();
        const publishedRows = data.published.map((item) => `src/content/resources/${item.file}`);
        existingFilesEl.innerHTML = publishedRows.length > 0
          ? publishedRows.map((row) => `<li>${row}</li>`).join("")
          : "<li>还没有发布的文章</li>";
      }

      function setStatus(message, isError = false) {
        statusEl.textContent = message;
        statusEl.classList.toggle("error", isError);
      }

      // Preview toggle
      previewBtn.addEventListener("click", () => {
        updatePreview();
        previewSection.classList.add("visible");
        previewSection.scrollIntoView({ behavior: "smooth", block: "start" });
      });

      closePreviewBtn.addEventListener("click", () => {
        previewSection.classList.remove("visible");
      });

      form.addEventListener("input", () => {
        // Update preview if visible
        if (previewSection.classList.contains("visible")) {
          updatePreview();
        }
      });

      document.querySelector("#refresh").addEventListener("click", loadExistingFiles);

      document.querySelectorAll("[data-command]").forEach((button) => {
        button.addEventListener("click", () => {
          fields.bodyEditor.focus();
          const command = button.dataset.command;
          const value = button.dataset.value;
          document.execCommand(command, false, value || null);
          if (previewSection.classList.contains("visible")) {
            updatePreview();
          }
        });
      });

      // Image insert button
      insertImageBtn.addEventListener("click", (e) => {
        e.preventDefault();
        console.log("插入图片按钮被点击");
        fields.imageUpload.click();
      });

      fields.imageUpload.addEventListener("change", async () => {
        const file = fields.imageUpload.files?.[0];
        console.log("文件选择:", file);
        if (!file) return;

        setStatus("正在上传图片...");
        
        try {
          const reader = new FileReader();
          reader.addEventListener("load", async () => {
            try {
              console.log("开始上传图片:", file.name);
              const response = await fetch("/api/upload-image", {
                method: "POST",
                headers: { "content-type": "application/json" },
                body: JSON.stringify({
                  name: file.name,
                  type: file.type,
                  data: reader.result
                })
              });
              
              const data = await response.json();
              console.log("服务器响应:", data);

              if (!response.ok) {
                setStatus(data.error || "图片上传失败。", true);
                return;
              }

              // 使用 insertHTML 替代 insertImage，更可靠
              fields.bodyEditor.focus();
              const selection = window.getSelection();
              const range = selection.getRangeAt(0);
              range.deleteContents();
              
              const img = document.createElement('img');
              img.src = data.url;
              img.alt = file.name.replace(/\.[^.]+$/, "");
              img.style.maxWidth = '100%';
              
              range.insertNode(img);
              
              // 在图片后添加一个空段落，方便继续编辑
              const p = document.createElement('p');
              p.innerHTML = '<br>';
              img.parentNode.insertBefore(p, img.nextSibling);
              
              fields.imageUpload.value = "";
              setStatus(`✓ 图片已插入：${file.name}`);
              console.log("图片插入成功");
              
              if (previewSection.classList.contains("visible")) {
                updatePreview();
              }
            } catch (err) {
              console.error("图片上传错误:", err);
              setStatus(`上传失败: ${err.message}`, true);
            }
          });
          
          reader.addEventListener("error", () => {
            console.error("文件读取失败");
            setStatus("文件读取失败", true);
          });
          
          reader.readAsDataURL(file);
        } catch (err) {
          console.error("处理图片时出错:", err);
          setStatus(`处理失败: ${err.message}`, true);
        }
      });

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        setStatus("正在保存...");
        const payload = {
          title: fields.title.value,
          slug: fields.slug.value,
          date: fields.date.value,
          category: fields.category.value,
          tags: getTags(),
          description: fields.description.value,
          featured: fields.featured.checked,
          overwrite: fields.overwrite.checked,
          target: "publish", // Always publish to website
          body: editorHtmlToMarkdown()
        };

        const response = await fetch("/api/save", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify(payload)
        });
        const data = await response.json();

        if (!response.ok) {
          setStatus(data.error || "保存失败。", true);
          return;
        }

        setStatus(`已发布：${data.files.join(", ")}`);
        await loadExistingFiles();
      });

      // 3. Set default date to today
      fields.date.value = new Date().toISOString().slice(0, 10);
      
      fields.bodyEditor.innerHTML = `
        <h2>Background</h2>
        <p>Start writing your article content here.</p>
        <h2>Key Points</h2>
        <ul>
          <li>Point one</li>
          <li>Point two</li>
        </ul>
        <h2>Next Steps</h2>
        <p>Guide readers to contact Ruijie for project consultation.</p>
      `;

      await loadMeta();
      await loadExistingFiles();
    </script>
  </body>
</html>
